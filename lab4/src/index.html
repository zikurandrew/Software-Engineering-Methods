<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторна робота №4</title>
</head>
<body class="theme-dark">

<h2 class="sr-only">ApproxMaster</h2>
<style>
    :root {
    --color-background-base: #f4f7fb;
    --color-background-primary: #ffffff;
    --color-background-secondary: #eef3f9;

    --color-background-info: rgba(37, 99, 235, 0.08);
    --color-background-warning: rgba(59, 130, 246, 0.12);
    --color-background-success: rgba(16, 185, 129, 0.12);

    --color-border-primary: #dbe4ee;
    --color-border-secondary: #d3dce6;
    --color-border-tertiary: #c7d2df;
    --color-border-info: #2563eb;

    --color-accent-lagrange: #2563eb;
    --color-accent-lsm: #10b981;
    --color-accent-original: #1d4ed8;
    --color-accent-data: #ef476f;

    --color-text-primary: #0f172a;
    --color-text-secondary: #475569;
    --color-text-tertiary: #64748b;

    --color-text-info: #2563eb;
    --color-text-warning: #2563eb;
    --color-text-success: #10b981;
    --color-text-danger: #ef4444;

    --font-mono: "Inter", "Segoe UI", sans-serif;

    --border-radius-md: 10px;
    --border-radius-lg: 18px;
}

    body {
        background:
        radial-gradient(circle at top left, #dbeafe 0%, transparent 35%),
        radial-gradient(circle at bottom right, #dcfce7 0%, transparent 35%),
        var(--color-background-base);

        color: var(--color-text-primary);
        font-family: var(--font-mono);
        margin: 0;
        padding: 24px;
    }
    .sr-only {
    text-align: center; 
}


    .t-btn {
    font-size: 13px;
    font-weight: 500;

    padding: 8px 16px;

    border: 1px solid var(--color-border-secondary);
    border-radius: 12px;

    background: #ffffff;
    color: var(--color-text-secondary);

    cursor: pointer;

    transition:
        all .18s ease;
}

    .t-btn:hover {
    background: #f8fbff;
    border-color: #93c5fd;
    color: #2563eb;
}

    .t-btn.active {
    background: #2563eb;
    color: white;
    border-color: #2563eb;

    box-shadow:
        0 4px 12px rgba(37, 99, 235, 0.25);
}

    .c-card {
    background: rgba(255,255,255,0.92);
    border: 1px solid var(--color-border-primary);
    border-radius: var(--border-radius-lg);
    overflow: hidden;

    box-shadow:
        0 4px 12px rgba(15, 23, 42, 0.05),
        0 1px 2px rgba(15, 23, 42, 0.04);

    backdrop-filter: blur(8px);

    transition:
        transform .18s ease,
        box-shadow .18s ease;
}

    .c-card:hover {
    transform: translateY(-2px);

    box-shadow:
        0 10px 24px rgba(15, 23, 42, 0.08),
        0 2px 4px rgba(15, 23, 42, 0.05);
}

    .c-card.dim {
        opacity: .35
    }

    .c-hdr {
        padding: 8px 12px;
        border-bottom: 0.5px solid var(--color-border-tertiary);
        display: flex;
        align-items: center;
        justify-content: space-between
    }

    .m-badge {
        font-size: 11px;
        font-weight: 500;
        padding: 2px 8px;
        border-radius: var(--border-radius-md)
    }

    .b-lag {
        background: var(--color-background-warning);
        color: var(--color-text-warning)
    }

    .b-lsm {
        background: var(--color-background-success);
        color: var(--color-text-success)
    }

    .err-val {
        font-size: 12px;
        color: var(--color-text-secondary);
        font-family: var(--font-mono)
    }

    .legend-row {
        padding: 6px 12px;
        display: flex;
        gap: 14px;
        flex-wrap: wrap
    }

    .legend-item {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 11px;
        color: var(--color-text-secondary)
    }

    .stat-grid {
        display: grid;
        grid-template-columns:1fr 1fr;
        gap: 1px;
        background: var(--color-border-tertiary);
        border-top: 0.5px solid var(--color-border-tertiary)
    }

    .stat-cell {
        background: var(--color-background-primary);
        padding: 6px 10px
    }

    .stat-lbl {
        font-size: 10px;
        color: var(--color-text-tertiary);
        margin-bottom: 2px
    }

    .stat-num {
        font-size: 12px;
        font-family: var(--font-mono);
        font-weight: 500
    }

    .good {
        color: var(--color-text-success)
    }

    .warn {
        color: var(--color-text-warning)
    }

    .bad {
        color: var(--color-text-danger)
    }

    #animBar {
        height: 2px;
        background: var(--color-border-tertiary);
        overflow: hidden;
        border-radius: 2px;
        margin-bottom: 12px;
        display: none
    }

    #animFill {
        height: 100%;
        background: var(--color-text-info);
        width: 0%;
        transition: width .05s
    }

    canvas {
    border-radius: 14px;
}
</style>

<div style="padding:.5rem 0 1.5rem">

    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;gap:8px;flex-wrap:wrap">
        <p style="font-size:13px;color:var(--color-text-secondary);margin:0;line-height:1.5">
            <strong style="color:var(--color-text-primary)">f(x) = sin(x)</strong>, x ∈ [0, 2π] &nbsp;|&nbsp; Лагранж
            (точна інтерполяція) &nbsp;·&nbsp; МНК (поліноміальна апроксимація)
        </p>
        <div style="display:flex;gap:6px">
            <div style="display:flex;align-items:center;gap:8px;margin-right:12px;background:var(--color-background-secondary);padding:4px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary)">
                <label for="noiseRange" style="font-size:11px;color:var(--color-text-tertiary);white-space:nowrap">Шум: <span id="noiseVal" style="color:var(--color-text-info);font-family:var(--font-mono);width:30px;display:inline-block">0%</span></label>
                <input type="range" id="noiseRange" min="0" max="15" value="0" style="width:80px;cursor:pointer">
            </div>
            <button id="animateBtn" class="t-btn">▶ Анімувати</button>
            <button id="resetBtn" class="t-btn">↺ Скинути</button>
        </div>
    </div>

    <div id="animBar">
        <div id="animFill"></div>
    </div>

    <div id="tabs" style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
        <button class="t-btn" data-n="5">5 точок</button>
        <button class="t-btn" data-n="10">10 точок</button>
        <button class="t-btn" data-n="20">20 точок</button>
    </div>

    <div id="chartsGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:10px"></div>

    

</div>

<script>
    const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
    const CHART_BG = '#ffffff';
    const GRID_C = '#dbe4ee';
    const AXIS_C = '#94a3b8';
    const LABEL_C = '#475569';

    const C_TRUE = '#2563eb';
    const C_LAG = '#3b82f6';
    const C_LSM = '#10b981';
    const C_PT = '#ef476f';

   
    const X0 = 0, X1 = 2 * Math.PI, RES = 320;
    const LSM_DEG = {5: 3, 10: 4, 20: 5};

    /**
     * Цільова функція f(x) = sin(x)
     */
    function f(x) {
        return Math.tanh(x);
    }

    /**
     * Генерація вузлів інтерполяції з можливістю додавання шуму
     */
    function genPts(n, noise = 0) {
        return Array.from({length: n}, (_, i) => {
            const x = X0 + (i / (n - 1)) * (X1 - X0);
            const noiseVal = (Math.random() * 3) * (noise / 400);
            return {x, y: f(x) + noiseVal};
        });
    }

    /**
     * Обчислення значення полінома Лагранжа в точці x
     */
    function lagAt(pts, x) {
        return pts.reduce((s, pi, i) => {
            let L = 1;
            pts.forEach((pj, j) => {
                if (j !== i) L *= (x - pj.x) / (pi.x - pj.x);
            });
            return s + pi.y * L;
        }, 0);
    }


    /**
     * Метод Гаусса для розв'язання СЛАР (Ax = b)
     * Використовується для знаходження коефіцієнтів МНК
     */
    function gaussElim(A, b) {
        const n = b.length;
        const M = A.map((r, i) => [...r, b[i]]);
        for (let c = 0; c < n; c++) {
            let mr = c;
            for (let r = c + 1; r < n; r++) if (Math.abs(M[r][c]) > Math.abs(M[mr][c])) mr = r;
            [M[c], M[mr]] = [M[mr], M[c]];
            const pv = M[c][c];
            if (Math.abs(pv) < 1e-14) continue;
            for (let r = c + 1; r < n; r++) {
                const fac = M[r][c] / pv;
                for (let k = c; k <= n; k++) M[r][k] -= fac * M[c][k];
            }
        }
        const x = new Array(n).fill(0);
        for (let i = n - 1; i >= 0; i--) {
            if (Math.abs(M[i][i]) < 1e-14) continue;
            x[i] = M[i][n];
            for (let j = i + 1; j < n; j++) x[i] -= M[i][j] * x[j];
            x[i] /= M[i][i];
        }
        return x;
    }

    /**
     * Апроксимація методом найменших квадратів (МНК)
     * Побудова нормальної системи рівнянь та її розв'язання
     */
    function fitLSM(pts, deg) {
        const m = deg + 1;
        const xs = pts.map(p => p.x);
        const mn = Math.min(...xs), mx = Math.max(...xs), rng = mx - mn || 1;
        const sc = pts.map(p => ({x: (p.x - mn) / rng, y: p.y}));
        const A = Array.from({length: m}, (_, i) => Array.from({length: m}, (_, j) => sc.reduce((s, p) => s + Math.pow(p.x, i + j), 0)));
        const bv = Array.from({length: m}, (_, i) => sc.reduce((s, p) => s + p.y * Math.pow(p.x, i), 0));
        const c = gaussElim(A, bv);
        return x => {
            const xs = (x - mn) / rng;
            return c.reduce((s, ci, i) => s + ci * Math.pow(xs, i), 0);
        };
    }

    /**
     * Побудова масиву точок кривої для візуалізації
     */
    function buildCurve(fn) {
        return Array.from({length: RES + 1}, (_, i) => {
            const x = X0 + (i / RES) * (X1 - X0);
            const y = fn(x);
            return {x, y: isFinite(y) ? y : 0};
        });
    }

    /**
     * Розрахунок метрик похибки (Max та RMS)
     */
    function errStats(fn) {
        const pts = Array.from({length: 500}, (_, i) => {
            const x = X0 + (i / 499) * (X1 - X0);
            return {x, y: f(x)};
        });
        const errs = pts.map(p => Math.abs(p.y - fn(p.x)));
        return {max: Math.max(...errs), rms: Math.sqrt(errs.reduce((s, e) => s + e * e, 0) / 500)};
    }

    function getDom(arrs, pad = .18) {
        const vals = arrs.flat().map(p => p.y).filter(isFinite);
        const mn = Math.min(...vals), mx = Math.max(...vals), rng = mx - mn || 1;
        return [mn - rng * pad, mx + rng * pad];
    }

    const DATA = {};
    [5, 10, 20].forEach(n => {
        const pts = genPts(n);
        const deg = LSM_DEG[n];
        const lFn = x => lagAt(pts, x);
        const lsmFn = fitLSM(pts, deg);
        DATA[n] = {
            pts, deg,
            trueCurve: buildCurve(f),
            lagCurve: buildCurve(lFn),
            lsmCurve: buildCurve(lsmFn),
            lagErr: errStats(lFn),
            lsmErr: errStats(lsmFn)
        };
    });

    /**
     * Рендеринг графіка на Canvas
     */
    function drawChart(canvas, {title, curves, pts, xDom, yDom, prog = 1}) {
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;
        const m = {t: 32, r: 14, b: 40, l: 52};
        const pw = W - m.l - m.r, ph = H - m.t - m.b;
        const tx = x => m.l + (x - xDom[0]) / (xDom[1] - xDom[0]) * pw;
        const ty = y => m.t + ph - (y - yDom[0]) / (yDom[1] - yDom[0]) * ph;

        ctx.fillStyle = CHART_BG;
        ctx.fillRect(0, 0, W, H);

        const ngx = 6, ngy = 5;
        ctx.strokeStyle = GRID_C;
        ctx.lineWidth = .8;
        for (let i = 0; i <= ngx; i++) {
            const x = m.l + (i / ngx) * pw;
            ctx.beginPath();
            ctx.moveTo(x, m.t);
            ctx.lineTo(x, m.t + ph);
            ctx.stroke();
            const xv = xDom[0] + (i / ngx) * (xDom[1] - xDom[0]);
            ctx.fillStyle = LABEL_C;
            ctx.font = '9px var(--font-mono,monospace)';
            ctx.textAlign = 'center';
            ctx.fillText(xv.toFixed(1), x, m.t + ph + 14);
        }
        for (let i = 0; i <= ngy; i++) {
            const y = m.t + (i / ngy) * ph;
            ctx.beginPath();
            ctx.moveTo(m.l, y);
            ctx.lineTo(m.l + pw, y);
            ctx.stroke();
            const yv = yDom[1] - (i / ngy) * (yDom[1] - yDom[0]);
            ctx.fillStyle = LABEL_C;
            ctx.font = '9px var(--font-mono,monospace)';
            ctx.textAlign = 'right';
            ctx.fillText(yv.toFixed(2), m.l - 4, y + 3);
        }

        const zy = ty(0);
        if (zy >= m.t && zy <= m.t + ph) {
            ctx.strokeStyle = AXIS_C;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(m.l, zy);
            ctx.lineTo(m.l + pw, zy);
            ctx.stroke();
        }

        ctx.save();
        ctx.beginPath();
        ctx.rect(m.l, m.t, pw, ph);
        ctx.clip();

        curves.forEach(({data, color, width = 2, dash = []}) => {
            const cnt = Math.max(2, Math.floor(data.length * prog));
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.setLineDash(dash);
            ctx.beginPath();
            for (let i = 0; i < cnt; i++) {
                const cx = tx(data[i].x), cy = ty(data[i].y);
                i === 0 ? ctx.moveTo(cx, cy) : ctx.lineTo(cx, cy);
            }
            ctx.stroke();
            ctx.setLineDash([]);
        });

        ctx.restore();

        pts.forEach(({x, y}) => {
            const cx = tx(x), cy = ty(y);
            ctx.beginPath();
            ctx.arc(cx, cy, 3.8, 0, Math.PI * 2);
            ctx.fillStyle = C_PT;
            ctx.fill();
            ctx.strokeStyle = isDark ? 'rgba(255,255,255,.7)' : 'white';
            ctx.lineWidth = 1.5;
            ctx.stroke();
        });

        ctx.fillStyle = isDark ? 'rgba(230,240,255,.8)' : 'rgba(20,30,60,.75)';
        ctx.font = 'bold 11px var(--font-sans,sans-serif)';
        ctx.textAlign = 'center';
        ctx.fillText(title, W / 2, 18);
    }

    const state = {activeN: 'all', prog: 1, animating: false, raf: null, noise: 0};

    function recalculateData() {
        [5, 10, 20].forEach(n => {
            const pts = genPts(n, state.noise);
            const deg = LSM_DEG[n];
            const lFn = x => lagAt(pts, x);
            const lsmFn = fitLSM(pts, deg);
            DATA[n] = {
                pts, deg,
                trueCurve: buildCurve(f),
                lagCurve: buildCurve(lFn),
                lsmCurve: buildCurve(lsmFn),
                lagErr: errStats(lFn),
                lsmErr: errStats(lsmFn)
            };
        });
    }

    /**
     * Генерація HTML-карток для кожного графіка
     */
    function buildCards() {
        const grid = document.getElementById('chartsGrid');
        grid.innerHTML = '';
        [5, 10, 20].forEach(n => {
            ['lag', 'lsm'].forEach(type => {
                const d = DATA[n];
                const err = type === 'lag' ? d.lagErr : d.lsmErr;
                const cls = type === 'lag' ? 'b-lag' : 'b-lsm';
                const lbl = type === 'lag' ? 'Лагранж' : 'МНК';
                const ec = (v) => v < 1e-4 ? 'good' : v < 1e-2 ? 'warn' : 'bad';

                const card = document.createElement('div');
                card.className = 'c-card';
                card.dataset.n = String(n);
                card.dataset.type = type;
                card.innerHTML = `
<div class="c-hdr">
  <span style="display:flex;align-items:center;gap:8px">
    <span class="m-badge ${cls}">${lbl}</span>
    <span style="font-size:12px;color:var(--color-text-secondary)">${n} точок${type === 'lsm' ? ` · ст. ${d.deg}` : ` · n-1=${n - 1}`}</span>
  </span>
  <span class="err-val">Max |E|: <span class="${ec(err.max)}">${err.max.toExponential(2)}</span></span>
</div>
<div style="padding:6px 6px 0;background:var(--color-background-secondary)">
  <canvas id="cv-${type}-${n}" width="520" height="280" style="width:100%;display:block;border-radius:4px" role="img" aria-label="${lbl} інтерполяція sin(x) з ${n} точками">${lbl} інтерполяція з ${n} точками.</canvas>
</div>
<div class="legend-row">
  <span class="legend-item"><span style="width:20px;height:2px;background:${C_TRUE};display:inline-block;margin-top:1px;border-top:2px dashed ${C_TRUE};background:none"></span>f(x)</span>
  <span class="legend-item"><span style="width:20px;height:2px;background:${type === 'lag' ? C_LAG : C_LSM};display:inline-block"></span>${lbl}</span>
  <span class="legend-item"><span style="width:8px;height:8px;border-radius:50%;background:${C_PT};display:inline-block;border:1.5px solid rgba(255,255,255,.5)"></span>Точки</span>
</div>
<div class="stat-grid">
  <div class="stat-cell"><div class="stat-lbl">Max |помилка|</div><div class="stat-num ${ec(err.max)}">${err.max.toExponential(4)}</div></div>
  <div class="stat-cell"><div class="stat-lbl">RMS помилка</div><div class="stat-num ${ec(err.rms)}">${err.rms.toExponential(4)}</div></div>
</div>`;
                grid.appendChild(card);
            });
        });
    }

    function renderAll(prog = 1) {
        [5, 10, 20].forEach(n => {
            const d = DATA[n];
            const xDom = [X0 - .3, X1 + .3];

            const lagCv = document.getElementById(`cv-lag-${n}`);
            if (lagCv) {
                const yDom = getDom([d.trueCurve, d.lagCurve, d.pts.map(p => ({y: p.y}))]);
                drawChart(lagCv, {
                    title: `Лагранж — ${n} точок`,
                    curves: [
                        {data: d.trueCurve, color: C_TRUE, width: 1.8, dash: [4, 3]},
                        {data: d.lagCurve, color: C_LAG, width: 2.2}
                    ],
                    pts: d.pts, xDom, yDom, prog
                });
            }

            const lsmCv = document.getElementById(`cv-lsm-${n}`);
            if (lsmCv) {
                const yDom = getDom([d.trueCurve, d.lsmCurve, d.pts.map(p => ({y: p.y}))]);
                drawChart(lsmCv, {
                    title: `МНК — ${n} точок (ступінь ${d.deg})`,
                    curves: [
                        {data: d.trueCurve, color: C_TRUE, width: 1.8, dash: [4, 3]},
                        {data: d.lsmCurve, color: C_LSM, width: 2.2}
                    ],
                    pts: d.pts, xDom, yDom, prog
                });
            }
        });
    }

    function applyFilter(n) {
    const cards = document.querySelectorAll('.c-card');

    cards.forEach(card => {
        if (n === 'all') {
            card.style.display = 'block';
        } else {
            card.style.display =
                card.dataset.n === n ? 'block' : 'none';
        }
    });

    const grid = document.getElementById('chartsGrid');

    if (n === 'all') {
        grid.style.gridTemplateColumns = '1fr 1fr';
    } else {
        grid.style.gridTemplateColumns = '1fr 1fr';
    }
}


    document.getElementById('tabs').addEventListener('click', e => {
        const btn = e.target.closest('.t-btn');
        if (!btn) return;
        state.activeN = btn.dataset.n;
        document.querySelectorAll('.t-btn').forEach(b => b.classList.toggle('active', b === btn));
        applyFilter(state.activeN);
    });

    /**
     * Запуск анімації малювання кривих
     */
    document.getElementById('animateBtn').addEventListener('click', () => {
        if (state.animating) {
            cancelAnimationFrame(state.raf);
            state.animating = false;
            document.getElementById('animateBtn').textContent = '▶ Анімувати';
            document.getElementById('animBar').style.display = 'none';
            return;
        }
        state.animating = true;
        state.prog = 0;
        document.getElementById('animateBtn').textContent = '⏸ Зупинити';
        document.getElementById('animBar').style.display = 'block';
        const step = () => {
            state.prog = Math.min(1, state.prog + .005);
            document.getElementById('animFill').style.width = (state.prog * 100) + '%';
            renderAll(state.prog);
            if (state.prog < 1) state.raf = requestAnimationFrame(step);
            else {
                state.animating = false;
                document.getElementById('animateBtn').textContent = '▶ Анімувати';
                setTimeout(() => {
                    document.getElementById('animBar').style.display = 'none';
                }, 600);
            }
        };
        state.raf = requestAnimationFrame(step);
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
        if (state.animating) {
            cancelAnimationFrame(state.raf);
            state.animating = false;
        }
        state.prog = 1;
        state.activeN = 'all';
        state.noise = 0;
        document.getElementById('noiseRange').value = 0;
        document.getElementById('noiseVal').textContent = '0%';
        document.getElementById('animateBtn').textContent = '▶ Анімувати';
        document.getElementById('animBar').style.display = 'none';
        document.querySelectorAll('.t-btn').forEach(b => b.classList.toggle('active', b.dataset.n === 'all'));
        recalculateData();
        buildCards();
        applyFilter('all');
        renderAll(1);
    });

    document.getElementById('noiseRange').addEventListener('input', e => {
        state.noise = parseInt(e.target.value);
        document.getElementById('noiseVal').textContent = state.noise + '%';
        recalculateData();
        buildCards();
        applyFilter(state.activeN);
        renderAll(state.prog);
    });

    buildCards();
    renderAll(1);
</script>

</body>
</html>
